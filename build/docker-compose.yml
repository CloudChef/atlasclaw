version: '3.8'

services:
  xuanwu:
    image: registry.cn-shanghai.aliyuncs.com/xuanwu/xuanwu:latest
    container_name: xuanwu
    ports:
      - "8000:8000"
    environment:
      - XUANWU_CONFIG=/app/workspace/xuanwu.json
    volumes:
      # Workspace: host /opt/xuanwu/workspace -> container /app/workspace
      - /opt/xuanwu/workspace:/app/workspace
      # Data: host /opt/xuanwu/data -> container /app/data
      - /opt/xuanwu/data:/app/data
      # Extensions: host /opt/xuanwu/extensions -> container /app/extensions
      - /opt/xuanwu/extensions/providers:/app/extensions/providers
      - /opt/xuanwu/extensions/skills:/app/extensions/skills
      - /opt/xuanwu/extensions/channels:/app/extensions/channels
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
