version: '3.8'

services:
  xuanwu:
    image: registry.cn-shanghai.aliyuncs.com/xuanwu/xuanwu-official:latest
    container_name: xuanwu
    ports:
      - "8000:8000"
    environment:
      - XUANWU_CONFIG=/app/workspace/xuanwu.json
    working_dir: /app/workspace
    volumes:
      # Workspace: host /opt/xuanwu/workspace -> container /app/workspace
      - /opt/xuanwu/workspace:/app/workspace
      # Data: host /opt/xuanwu/data -> container /app/data
      - /opt/xuanwu/data:/app/data
      # Extensions: host /opt/xuanwu/extensions -> container /app/extensions
      - /opt/xuanwu/extensions/providers:/app/extensions/providers
      - /opt/xuanwu/extensions/skills:/app/extensions/skills
      - /opt/xuanwu/extensions/channels:/app/extensions/channels
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  mysql:
    image: mysql:8.4
    container_name: xuanwu-mysql
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: xuanwu
      MYSQL_USER: xuanwu
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    secrets:
      - mysql_root_password
      - mysql_password
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$(cat /run/secrets/mysql_root_password)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=2G
      - --innodb-log-file-size=512M
      - --max-connections=200
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_password:
    file: ./secrets/mysql_password.txt

volumes:
  mysql-data:
    driver: local
